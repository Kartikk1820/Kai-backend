version: '3.8'

services:
  web:
    build: .
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
      - redis
    networks:
      - kc_network

  celery:
    build: .
    command: celery -A kc_portal worker -l info
    volumes:
      - .:/app
      - media_data:/app/media
    env_file: .env
    depends_on:
      - db
      - redis
    networks:
      - kc_network

  celery-beat:
    build: .
    command: celery -A kc_portal beat -l info
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - db
      - redis
    networks:
      - kc_network

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: kai_portal
      POSTGRES_USER: kai
      POSTGRES_PASSWORD: kai
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - kc_network

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - kc_network

volumes:
  pg_data:
  redis_data:
  media_data:

networks:
  kc_network:
    external: true

